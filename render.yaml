services:
  - type: web
    name: ajaia-docs
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && cd server && npm install && cd ../client && npm install --include=dev && npm run build
    startCommand: NODE_ENV=production node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/data/ajaia.db
      - key: CLIENT_URL
        value: https://codexa-1v3q.onrender.com
